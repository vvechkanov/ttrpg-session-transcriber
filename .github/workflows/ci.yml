name: CI — pytest + build.spec

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────
  # pytest matrix — Ubuntu + Windows. Uses QT_QPA_PLATFORM=offscreen
  # so pytest-qt and the QML boot smoke run without a display server.
  # Skips tests marked `slow` / `requires_asr` — those need GPU and
  # the GigaAM / faster-whisper weights bundles, which are too heavy
  # for CI (the bootstrap installer provisions them on user machines).
  # ────────────────────────────────────────────────────────────────────
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    runs-on: ${{ matrix.os }}

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # numpy is imported by tests/conftest.py for its audio
          # fixtures (sine synthesis via wave + struct). The ML
          # backends (torch, faster-whisper) stay out — they are
          # provisioned by the bootstrap launcher at runtime, not
          # needed for the test suite.
          pip install PySide6 pytest pytest-qt pytest-cov numpy

      # Linux-only: libEGL / xkbcommon are needed by Qt's offscreen
      # platform plugin even though we don't show a window. Without
      # them import of PySide6.QtQuickControls2 segfaults. ffmpeg is
      # pulled in for tests/test_core_peaks.py which synthesises a
      # sine-wave FLAC via ``ffmpeg -f lavfi -i sine=…`` — the
      # bundled tools/ffmpeg/ isn't checked in (.gitignore).
      - name: Install Qt offscreen + ffmpeg deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libfontconfig1 \
            libdbus-1-3 \
            ffmpeg

      # Windows: runners already ship ffmpeg.exe on PATH via chocolatey's
      # pre-installed tooling; test_core_peaks.py resolves it through
      # shutil.which. Verify here so a future runner-image change
      # surfaces as a skip rather than a silent pass.
      - name: Verify ffmpeg on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg -y --no-progress
          }
          ffmpeg -version | Select-Object -First 1

      - name: Run pytest
        shell: bash
        run: |
          pytest tests -m "not slow and not requires_asr" -v

  # ────────────────────────────────────────────────────────────────────
  # Static build.spec check — parse-only, no PyInstaller run. The real
  # build happens in release.yml on tag push. This catches spec drifts
  # early (e.g. typoed hiddenimports).
  # ────────────────────────────────────────────────────────────────────
  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          # conftest.py pulls in numpy for the audio fixtures even
          # when we only run test_build_spec.py — same dep list as
          # the full pytest job, minus PySide6.
          pip install pytest numpy

      - name: Run build.spec invariants
        # --noconftest skips the project-wide conftest (numpy fixtures
        # etc.) since test_build_spec.py only parses the .spec file;
        # keeps spec-lint a lean 7-second check.
        run: pytest tests/test_build_spec.py -v --noconftest
